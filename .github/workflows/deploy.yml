name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --progress=plain \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://spaijkmjopvcqudfswxs.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwYWlqa21qb3B2Y3F1ZGZzd3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDYwNTEsImV4cCI6MjA5MTE4MjA1MX0.R-ZZSdsCY7lrEKDCp2Cg-nSlzgD58lLLz6l3joburNY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_51TJYJDAnqCx18ZdWFztvB9pWWiaaSoadcZ8bXiPH87PmMPskls1Rz3cjcbTdvm43v4Z5XeSJrxIujIrvjti3vEuY00lQ27rjpI" \
            --build-arg NEXT_PUBLIC_APP_URL="https://www.fisiogendor.com" \
            -t fisiogendor:build \
            .

      - name: Push to GHCR
        run: |
          docker tag fisiogendor:build "ghcr.io/josuevalerio/fisiogendor2:latest"
          docker tag fisiogendor:build "ghcr.io/josuevalerio/fisiogendor2:${{ github.sha }}"
          docker push "ghcr.io/josuevalerio/fisiogendor2:latest"
          docker push "ghcr.io/josuevalerio/fisiogendor2:${{ github.sha }}"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /docker/fisiogendor-app

            cat > /docker/fisiogendor-app/docker-compose.yml << 'COMPOSEFILE'
            services:
              app:
                image: ghcr.io/josuevalerio/fisiogendor2:latest
                restart: always
                networks:
                  - traefik-proxy
                env_file: .env
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.fisiogendor.entrypoints=websecure"
                  - "traefik.http.routers.fisiogendor.rule=Host(`fisiogendor.com`) || Host(`www.fisiogendor.com`)"
                  - "traefik.http.routers.fisiogendor.tls.certresolver=letsencrypt"
                  - "traefik.http.routers.fisiogendor.tls.domains[0].main=fisiogendor.com"
                  - "traefik.http.routers.fisiogendor.tls.domains[0].sans=www.fisiogendor.com"
                  - "traefik.http.services.fisiogendor.loadbalancer.server.port=3000"
              worker:
                image: ghcr.io/josuevalerio/fisiogendor2:latest
                restart: always
                command: node worker-bundle.js
                env_file: .env
                networks:
                  - traefik-proxy
            networks:
              traefik-proxy:
                external: true
            COMPOSEFILE

            cat > /docker/fisiogendor-app/.env << ENVFILE
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }}
            EVOLUTION_API_URL=http://evolution-go-p4mw-api-1:4000
            EVOLUTION_API_KEY=${{ secrets.GLOBAL_API_KEY }}
            GLOBAL_API_KEY=${{ secrets.GLOBAL_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            NEXT_PUBLIC_APP_URL=https://www.fisiogendor.com
            ENVFILE

            cd /docker/fisiogendor-app
            docker pull ghcr.io/josuevalerio/fisiogendor2:latest
            docker compose -p fisiogendor-app up -d --no-build --remove-orphans
