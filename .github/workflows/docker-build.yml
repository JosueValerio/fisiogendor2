name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Test npm ci inside node:24-slim container
        run: |
          docker run --rm \
            -v "$(pwd)/package.json:/app/package.json:ro" \
            -v "$(pwd)/package-lock.json:/app/package-lock.json:ro" \
            -w /app \
            node:24-slim \
            npm ci --prefer-offline 2>&1 | tail -20
          echo "npm ci exit: $?"

      - name: Build full image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://spaijkmjopvcqudfswxs.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwYWlqa21qb3B2Y3F1ZGZzd3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDYwNTEsImV4cCI6MjA5MTE4MjA1MX0.R-ZZSdsCY7lrEKDCp2Cg-nSlzgD58lLLz6l3joburNY" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="pk_test_51TJYJDAnqCx18ZdWFztvB9pWWiaaSoadcZ8bXiPH87PmMPskls1Rz3cjcbTdvm43v4Z5XeSJrxIujIrvjti3vEuY00lQ27rjpI" \
            --build-arg NEXT_PUBLIC_APP_URL="https://www.fisiogendor.com" \
            -t "ghcr.io/josuevalerio/fisiogendor2:latest" \
            -t "ghcr.io/josuevalerio/fisiogendor2:${{ github.sha }}" \
            .
          echo "FULL BUILD OK"

      - name: Push Docker image
        run: |
          docker push "ghcr.io/josuevalerio/fisiogendor2:latest"
          docker push "ghcr.io/josuevalerio/fisiogendor2:${{ github.sha }}"
